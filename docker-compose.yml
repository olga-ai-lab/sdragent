version: "3.8"

services:
  sdr-agent:
    build: .
    container_name: sdr-agent-88i
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/webhooks/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Opcional: Watchtower para auto-update da imagem
  # watchtower:
